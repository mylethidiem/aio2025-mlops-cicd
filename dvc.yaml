# DVC Pipeline Configuration
# This pipeline tracks data changes and triggers training

stages:
  prepare_data:
    cmd: echo "Data prepared at $(date)" > data/.data_version
    deps:
      - data/train/images
      - data/train/labels
      - data/valid/images
      - data/valid/labels
      - data/test/images
      - data/test/labels
      - data/data.yaml
    outs:
      - data/.data_version:
          cache: false

  train:
    cmd: python train.py --epochs ${train.epochs} --model ${train.model} --batch ${train.batch_size}
    deps:
      - train.py
      - data/.data_version
      - data/data.yaml
      - checkpoints/${train.model}.pt
    params:
      - train.epochs
      - train.model
      - train.batch_size
      - train.imgsz
    outs:
      - runs/detect/train/weights/best.pt:
          cache: true
          persist: true
    plots:
      - runs/detect/train/results.csv:
          cache: false
          x: epoch  