# DVC Pipeline Configuration
# This pipeline tracks data changes and triggers training

stages:
  train:
    cmd: python train.py --epochs ${train.epochs} --model ${train.model} --batch
      ${train.batch_size}
    deps:
    - train.py
    - data/.data_version
    - data/data.yaml
    - checkpoints/${train.model}.pt
    params:
    - train.epochs
    - train.model
    - train.batch_size
    - train.imgsz
    outs: []
    plots:
    - runs/detect/train/results.csv:
        cache: false
        x: epoch
